<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeview InfoComm 2026 | Appointment Booking</title>
    <style>
        /* COLOR PALETTE: Red, Black, Gray */
        :root { 
            --pv-red: #cc0000; 
            --pv-black: #111111; 
            --pv-gray-bg: #e6e6e6; 
            --pv-gray-light: #f5f5f5;
            --pv-gray-dark: #555555;
        }
        
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--pv-gray-bg); margin: 0; padding: 20px; display: flex; justify-content: center; color: var(--pv-black); }
        .card { max-width: 700px; width: 100%; background: #ffffff; padding: 35px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 6px solid var(--pv-red); }
        
        header { text-align: center; border-bottom: 1px solid #ccc; margin-bottom: 25px; padding-bottom: 15px; }
        h2 { color: var(--pv-red); margin: 0; text-transform: uppercase; letter-spacing: 2px; font-size: 26px; }
        p.subtitle { color: var(--pv-gray-dark); margin-top: 8px; font-weight: bold; }
        
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; font-size: 0.9em; color: var(--pv-black); }
        input, select { width: 100%; padding: 12px; border: 1px solid #bbb; border-radius: 4px; box-sizing: border-box; font-size: 15px; background: var(--pv-gray-light); transition: 0.3s; }
        input:focus, select:focus { outline: none; border-color: var(--pv-red); box-shadow: 0 0 5px rgba(204,0,0,0.3); background: #ffffff; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        button#submitBtn { 
            background: var(--pv-red); color: #ffffff; padding: 16px; border: none; border-radius: 4px; 
            cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; margin-top: 15px; text-transform: uppercase; transition: 0.2s;
        }
        button#submitBtn:hover { background: #990000; }
        button:disabled { background: var(--pv-gray-dark); cursor: not-allowed; }

        /* SUGGESTION BOX (Red & Grays) */
        #suggestionBox {
            display: none; margin-top: 25px; padding: 20px; 
            border: 2px solid var(--pv-red); border-radius: 6px; background: #ffffff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            animation: fadeIn 0.4s ease-in-out;
        }
        .suggestion-title { font-weight: bold; color: var(--pv-red); margin-bottom: 15px; display: block; font-size: 1.1em; }
        .suggestion-pill {
            display: inline-block; background: var(--pv-gray-light); border: 1px solid var(--pv-black); color: var(--pv-black);
            padding: 10px 18px; border-radius: 25px; margin: 5px 5px 10px 0; cursor: pointer;
            font-size: 0.9em; font-weight: bold; transition: all 0.2s;
        }
        .suggestion-pill:hover { background: var(--pv-red); color: #ffffff; border-color: var(--pv-red); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        .loader { display: none; text-align: center; color: var(--pv-red); font-weight: bold; margin-top: 15px; font-style: italic; }
    </style>
</head>
<body>

<div class="card">
    <header>
        <h2>Primeview</h2>
        <p class="subtitle">InfoComm 2026 | Schedule Your Meeting</p>
    </header>

    <form id="bookingForm">
        <div class="grid">
            <div class="form-group"><label>First Name *</label><input type="text" id="firstName" required></div>
            <div class="form-group"><label>Last Name *</label><input type="text" id="lastName" required></div>
        </div>
        <div class="form-group"><label>Company Name *</label><input type="text" id="companyName" required></div>
        <div class="grid">
            <div class="form-group"><label>Email *</label><input type="email" id="email" required></div>
            <div class="form-group"><label>Phone *</label><input type="tel" id="phone" required></div>
        </div>
        <div class="form-group">
            <label>Region *</label>
            <select id="region" onchange="updateRepList()" required>
                <option value="">Select Region...</option>
                <option value="USA">USA</option>
                <option value="ROW">Rest of World (ROW)</option>
            </select>
        </div>
        <div class="form-group">
            <label>Requested Representative (Optional)</label>
            <select id="requestedRep"><option value="">Any Available</option></select>
        </div>
        <div class="grid">
            <div class="form-group"><label>Date *</label><input type="date" id="date" min="2026-06-17" max="2026-06-19" required></div>
            <div class="form-group"><label>Time Slot *</label><select id="timeSlot" required></select></div>
        </div>

        <button type="submit" id="submitBtn">Check Availability & Book</button>
        <div id="loader" class="loader">Processing your request...</div>
    </form>

    <div id="suggestionBox">
        <span class="suggestion-title">The requested slot is busy. Please choose an alternative:</span>
        <div id="suggestionList"></div>
    </div>
</div>

<script>
    // INSERISCI QUI IL TUO URL DEL DEPLOYMENT GOOGLE
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzwz_d0NNEtUgFtC7cqFm4SnfRPoWadqRPLw81m0SYfEWUxZiQlIucTxLbq0y5ssm4c/exec';

    const reps = [];
    ["CEO", "CTO", "VP Sales USA", "VP Sales ROW", "CFO", "COO"].forEach(n => reps.push({name: n, region: 'BOTH'}));
    for(let i=1; i<=30; i++) reps.push({name: `AM USA ${i}`, region: 'USA'});
    for(let i=1; i<=2; i++) reps.push({name: `AM ROW ${i}`, region: 'ROW'});

    const slots = ["09:00", "09:40", "10:20", "11:00", "11:40", "12:20", "13:00", "13:40", "14:20", "15:00", "15:40", "16:20"];
    const timeSelect = document.getElementById('timeSlot');
    slots.forEach(s => timeSelect.add(new Option(s, s)));

    function updateRepList() {
        const region = document.getElementById('region').value;
        const repDropdown = document.getElementById('requestedRep');
        repDropdown.innerHTML = '<option value="">Any Available</option>';
        reps.filter(r => r.region === 'BOTH' || r.region === region).forEach(r => {
            repDropdown.add(new Option(r.name, r.name));
        });
    }

    document.getElementById('bookingForm').addEventListener('submit', function(e) {
        if(e) e.preventDefault();
        sendBooking();
    });

    function sendBooking() {
        const btn = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        const suggBox = document.getElementById('suggestionBox');
        
        btn.disabled = true;
        loader.style.display = 'block';
        suggBox.style.display = 'none';

        const payload = {
            firstName: document.getElementById('firstName').value,
            lastName: document.getElementById('lastName').value,
            companyName: document.getElementById('companyName').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            region: document.getElementById('region').value,
            date: document.getElementById('date').value,
            time: document.getElementById('timeSlot').value,
            rep: document.getElementById('requestedRep').value || "Any Available"
        };

        fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) })
        .then(res => res.json())
        .then(data => {
            if (data.status === 'success') {
                alert("SUCCESS!\n" + data.message);
                document.getElementById('bookingForm').reset();
            } 
            else if (data.status === 'busy') {
                showSuggestions(data.suggestions);
            }
            else if (data.status === 'error') {
                alert("ERROR:\n" + data.message);
            }
        })
        .catch(err => alert("Connection error. Ensure you are online and the Script URL is correct."))
        .finally(() => {
            btn.disabled = false;
            loader.style.display = 'none';
        });
    }

    function showSuggestions(suggestions) {
        const suggBox = document.getElementById('suggestionBox');
        const suggList = document.getElementById('suggestionList');
        suggBox.style.display = 'block';
        suggList.innerHTML = '';

        // Suggerimenti Orario (Stesso Rep)
        if (suggestions.timeSlots && suggestions.timeSlots.length > 0) {
            suggestions.timeSlots.forEach(time => {
                createPill(`Keep Rep, change time to ${time}`, () => {
                    document.getElementById('timeSlot').value = time;
                    sendBooking();
                });
            });
        }

        // Suggerimento Altro Rep (Stesso Orario)
        if (suggestions.otherRepAvailable) {
            createPill(`Keep Time, find another available Rep`, () => {
                document.getElementById('requestedRep').value = ""; // Forza "Any Available"
                sendBooking();
            });
        }
    }

    function createPill(text, callback) {
        const pill = document.createElement('div');
        pill.className = 'suggestion-pill';
        pill.innerText = text;
        pill.onclick = callback;
        document.getElementById('suggestionList').appendChild(pill);
    }
</script>

</body>
</html>
