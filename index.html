<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeview InfoComm 2026 | Appointment Booking</title>
    <style>
        :root { --pv-red: #cc0000; --pv-black: #111111; --pv-gray-bg: #e6e6e6; --pv-gray-light: #f5f5f5; --pv-gray-dark: #555555; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--pv-gray-bg); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: var(--pv-black); }
        .card { max-width: 700px; width: 100%; background: #ffffff; padding: 40px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 6px solid var(--pv-red); box-sizing: border-box; }
        header { text-align: center; border-bottom: 1px solid #ccc; margin-bottom: 25px; padding-bottom: 15px; }
        .logo { max-width: 250px; height: auto; display: block; margin: 0 auto 10px auto; transition: 0.2s; }
        .logo:hover { transform: scale(1.02); }
        p.subtitle { color: var(--pv-gray-dark); margin: 0; font-weight: bold; text-transform: uppercase; font-size: 0.9em; letter-spacing: 1px;}
        .booth-link { display: inline-block; margin-top: 10px; color: var(--pv-red); font-weight: bold; text-decoration: none; font-size: 0.95em; background: #fff0f0; padding: 5px 15px; border-radius: 20px; border: 1px solid #ffcccc; transition: 0.2s;}
        .booth-link:hover { background: var(--pv-red); color: white; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-weight: bold; font-size: 0.9em; color: var(--pv-black); }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #bbb; border-radius: 4px; box-sizing: border-box; font-size: 15px; background: var(--pv-gray-light); transition: 0.3s; font-family: inherit; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--pv-red); box-shadow: 0 0 5px rgba(204,0,0,0.3); background: #ffffff; }
        textarea { resize: vertical; min-height: 50px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        button#submitBtn { background: var(--pv-red); color: #ffffff; padding: 16px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; margin-top: 15px; text-transform: uppercase; transition: 0.2s; }
        button#submitBtn:hover { background: #990000; }
        button:disabled { background: var(--pv-gray-dark); cursor: not-allowed; }
        
        #suggestionBox { display: none; margin-top: 25px; padding: 20px; border: 2px solid var(--pv-red); border-radius: 6px; background: #ffffff; box-shadow: 0 4px 10px rgba(0,0,0,0.05); animation: fadeIn 0.4s ease-in-out; }
        .suggestion-title { font-weight: bold; color: var(--pv-red); margin-bottom: 15px; display: block; font-size: 1.1em; }
        .suggestion-pill { display: inline-block; background: var(--pv-gray-light); border: 1px solid var(--pv-black); color: var(--pv-black); padding: 10px 18px; border-radius: 25px; margin: 5px 5px 10px 0; cursor: pointer; font-size: 0.9em; font-weight: bold; transition: all 0.2s; }
        .suggestion-pill:hover { background: var(--pv-red); color: #ffffff; border-color: var(--pv-red); }
        
        .loader { display: none; text-align: center; color: var(--pv-red); font-weight: bold; margin-top: 15px; font-style: italic; }
        
        /* MODAL STYLES */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; animation: fadeIn 0.3s; }
        .modal-content { background: white; padding: 40px; border-radius: 8px; max-width: 500px; width: 90%; text-align: center; border-top: 6px solid var(--pv-red); box-shadow: 0 15px 30px rgba(0,0,0,0.3); }
        .modal-content h2 { color: var(--pv-red); margin-top: 0; }
        .modal-content p { color: var(--pv-black); font-size: 1.1em; line-height: 1.5; margin-bottom: 30px; }
        .social-links { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; flex-wrap: wrap; }
        .social-links a { text-decoration: none; color: white; background: var(--pv-black); padding: 10px 20px; border-radius: 25px; font-weight: bold; font-size: 0.9em; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .social-links a:hover { background: var(--pv-red); }
        .close-modal-btn { background: #ddd; color: #333; border: none; padding: 10px 30px; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .close-modal-btn:hover { background: #ccc; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { .grid { grid-template-columns: 1fr; gap: 0; } .card { padding: 25px 20px; } .logo { max-width: 200px; } .social-links a { width: 100%; justify-content: center; } }
    </style>
</head>
<body>

<div class="card">
    <header>
        <a href="https://primeviewglobal.com/" target="_blank">
            <img src="logo.png" alt="Primeview Logo" class="logo">
        </a>
        <p class="subtitle">InfoComm 2026 | Schedule Your Meeting</p>
        <a href="https://infocomm26.mapyourshow.com/8_0/exhibitor/exhibitor-details.cfm?exhid=770637" target="_blank" class="booth-link">📍 Where to find us at InfoComm</a>
    </header>

    <form id="bookingForm">
        <div class="grid">
            <div class="form-group"><label>First Name *</label><input type="text" id="firstName" required></div>
            <div class="form-group"><label>Last Name *</label><input type="text" id="lastName" required></div>
        </div>
        
        <div class="grid">
            <div class="form-group"><label>Company Name *</label><input type="text" id="companyName" required></div>
            <div class="form-group">
                <label>Your Role *</label>
                <select id="clientRole" required>
                    <option value="">Select Role...</option>
                    <option value="CEO">CEO / President / Owner</option>
                    <option value="CFO">CFO / Financial</option>
                    <option value="CTO">CTO / IT Director</option>
                    <option value="VP">VP / Executive</option>
                    <option value="Sales">Sales / Business Dev</option>
                    <option value="Technical">Technical / Engineer</option>
                    <option value="Designer">Designer / Architect</option>
                    <option value="Other">Other</option>
                </select>
            </div>
        </div>

        <div class="grid">
            <div class="form-group"><label>Email *</label><input type="email" id="email" required></div>
            <div class="form-group"><label>Phone *</label><input type="tel" id="phone" required></div>
        </div>
        
        <div class="grid">
            <div class="form-group">
                <label>Region *</label>
                <select id="region" onchange="checkRegionDates()" required>
                    <option value="">Select Region...</option>
                    <option value="USA">USA</option>
                    <option value="Global">Global</option>
                </select>
            </div>
            <div class="form-group">
                <label>Date *</label>
                <select id="date" required>
                    <option value="">Select Date...</option>
                    <option value="2026-06-17">June 17, 2026</option>
                    <option value="2026-06-18">June 18, 2026</option>
                    <option value="2026-06-19" id="optJune19">June 19, 2026</option>
                </select>
            </div>
        </div>

        <div class="grid">
            <div class="form-group"><label>Time Slot *</label><select id="timeSlot" required></select></div>
            <div class="form-group">
                <label>Comments (Optional)</label>
                <textarea id="comments" maxlength="150" placeholder="Add a short note (max 150 characters)..."></textarea>
            </div>
        </div>

        <button type="submit" id="submitBtn">Check Availability & Book</button>
        <div id="loader" class="loader">Verifying schedules...</div>
    </form>

    <div id="suggestionBox">
        <span class="suggestion-title">The requested slot is busy. Please choose an alternative:</span>
        <div id="suggestionList"></div>
    </div>
</div>

<div id="successModal" class="modal-overlay">
    <div class="modal-content">
        <h2>🎉 Request Sent!</h2>
        <p id="modalMessage">Your meeting request has been successfully processed.</p>
        
        <div class="social-links">
            <a href="https://www.linkedin.com/company/primeviewusa/about/" target="_blank">🔗 LinkedIn</a>
            <a href="mailto:info@primeviewglobal.com">✉️ Email Us</a>
            <a href="https://primeviewglobal.com/" target="_blank">🌐 Website</a>
        </div>
        
        <button class="close-modal-btn" onclick="closeModal()">Close & Return</button>
    </div>
</div>

<script>
    // RICORDATI DI INCOLLARE QUI IL TUO NUOVO DEPLOYMENT URL GOOGLE SCRIPT!
    const SCRIPT_URL = 'INCOLLA_QUI_IL_NUOVO_URL_DI_GOOGLE';

    const slots = ["09:00", "09:30", "10:00", "10:30", "11:00", "11:30", "12:00", "12:30", "13:00", "13:30", "14:00", "14:30", "15:00", "15:30", "16:00", "16:30"];
    const timeSelect = document.getElementById('timeSlot');
    slots.forEach(s => timeSelect.add(new Option(s, s)));

    function checkRegionDates() {
        const region = document.getElementById('region').value;
        const dateSelect = document.getElementById('date');
        const optJune19 = document.getElementById('optJune19');
        
        if (region === 'Global') {
            optJune19.disabled = true;
            if (dateSelect.value === '2026-06-19') {
                dateSelect.value = ''; 
                alert("Global representatives are only available on June 17 and 18.");
            }
        } else {
            optJune19.disabled = false;
        }
    }

    document.getElementById('bookingForm').addEventListener('submit', function(e) {
        if(e) e.preventDefault();
        sendBooking();
    });

    function sendBooking() {
        const btn = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        const suggBox = document.getElementById('suggestionBox');
        
        btn.disabled = true;
        loader.style.display = 'block';
        suggBox.style.display = 'none';

        const payload = {
            firstName: document.getElementById('firstName').value,
            lastName: document.getElementById('lastName').value,
            companyName: document.getElementById('companyName').value,
            clientRole: document.getElementById('clientRole').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            region: document.getElementById('region').value,
            date: document.getElementById('date').value,
            time: document.getElementById('timeSlot').value,
            comments: document.getElementById('comments').value
        };

        fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) })
        .then(res => res.json())
        .then(data => {
            if (data.status === 'success') {
                document.getElementById('modalMessage').innerText = data.message;
                document.getElementById('successModal').style.display = 'flex';
                document.getElementById('bookingForm').reset();
            } 
            else if (data.status === 'busy') {
                showSuggestions(data.suggestions);
            }
            else if (data.status === 'error') {
                alert("ERROR:\n" + data.message);
            }
        })
        .catch(err => alert("Connection error. Ensure you are online and the Script URL is correct."))
        .finally(() => {
            btn.disabled = false;
            loader.style.display = 'none';
        });
    }

    function showSuggestions(suggestions) {
        const suggBox = document.getElementById('suggestionBox');
        const suggList = document.getElementById('suggestionList');
        suggBox.style.display = 'block';
        suggList.innerHTML = '';

        if (suggestions.timeSlots && suggestions.timeSlots.length > 0) {
            suggestions.timeSlots.forEach(time => {
                createPill(`Available at ${time}`, () => {
                    document.getElementById('timeSlot').value = time;
                    sendBooking();
                });
            });
        }
    }

    function createPill(text, callback) {
        const pill = document.createElement('div');
        pill.className = 'suggestion-pill';
        pill.innerText = text;
        pill.onclick = callback;
        document.getElementById('suggestionList').appendChild(pill);
    }

    function closeModal() {
        document.getElementById('successModal').style.display = 'none';
    }
</script>

</body>
</html>
