<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeview InfoComm 2026 | Smart Booking</title>
    <style>
        :root { --pv-blue: #0056b3; --pv-dark: #1a1a1a; --pv-light: #f4f7f9; --pv-warn: #ffc107; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--pv-light); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { max-width: 700px; width: 100%; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        header { text-align: center; border-bottom: 3px solid var(--pv-blue); margin-bottom: 25px; padding-bottom: 15px; }
        h2 { color: var(--pv-blue); margin: 0; text-transform: uppercase; letter-spacing: 1px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.85em; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 15px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        button#submitBtn { 
            background: var(--pv-blue); color: white; padding: 15px; border: none; border-radius: 8px; 
            cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; margin-top: 10px;
        }
        button:disabled { background: #ccc; }

        /* SUGGESTION BOX STYLE */
        #suggestionBox {
            display: none; margin-top: 20px; padding: 20px; 
            border: 2px solid var(--pv-warn); border-radius: 10px; background: #fff9e6;
            animation: fadeIn 0.5s;
        }
        .suggestion-title { font-weight: bold; color: #856404; margin-bottom: 10px; display: block; }
        .suggestion-pill {
            display: inline-block; background: white; border: 1px solid var(--pv-warn);
            padding: 8px 15px; border-radius: 20px; margin: 5px; cursor: pointer;
            font-size: 0.9em; transition: 0.2s;
        }
        .suggestion-pill:hover { background: var(--pv-warn); color: black; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .loader { display: none; text-align: center; color: var(--pv-blue); font-weight: bold; margin: 10px 0; }
    </style>
</head>
<body>

<div class="card">
    <header>
        <h2>Primeview</h2>
        <p>InfoComm 2026 | Schedule Your Meeting</p>
    </header>

    <form id="bookingForm">
        <div class="grid">
            <div class="form-group"><label>First Name *</label><input type="text" id="firstName" required></div>
            <div class="form-group"><label>Last Name *</label><input type="text" id="lastName" required></div>
        </div>
        <div class="form-group"><label>Company Name *</label><input type="text" id="companyName" required></div>
        <div class="grid">
            <div class="form-group"><label>Email *</label><input type="email" id="email" required></div>
            <div class="form-group"><label>Phone *</label><input type="tel" id="phone" required></div>
        </div>
        <div class="form-group">
            <label>Region *</label>
            <select id="region" onchange="updateRepList()" required>
                <option value="">Select Region...</option>
                <option value="USA">USA</option>
                <option value="ROW">Rest of World (ROW)</option>
            </select>
        </div>
        <div class="form-group">
            <label>Requested Representative (Optional)</label>
            <select id="requestedRep"><option value="">Any Available</option></select>
        </div>
        <div class="grid">
            <div class="form-group"><label>Date *</label><input type="date" id="date" min="2026-06-17" max="2026-06-19" required></div>
            <div class="form-group"><label>Time Slot *</label><select id="timeSlot" required></select></div>
        </div>

        <button type="submit" id="submitBtn">Check Availability & Book</button>
        <div id="loader" class="loader">Processing your request...</div>
    </form>

    <div id="suggestionBox">
        <span class="suggestion-title">⚠️ Requested slot is busy. Try one of these options:</span>
        <div id="suggestionList"></div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzwz_d0NNEtUgFtC7cqFm4SnfRPoWadqRPLw81m0SYfEWUxZiQlIucTxLbq0y5ssm4c/exec';

    // Data initialization
    const reps = [];
    ["CEO", "CTO", "VP Sales USA", "VP Sales ROW", "CFO", "COO"].forEach(n => reps.push({name: n, region: 'BOTH'}));
    for(let i=1; i<=30; i++) reps.push({name: `AM USA ${i}`, region: 'USA'});
    for(let i=1; i<=2; i++) reps.push({name: `AM ROW ${i}`, region: 'ROW'});

    const slots = ["09:00", "09:40", "10:20", "11:00", "11:40", "12:20", "13:00", "13:40", "14:20", "15:00", "15:40", "16:20"];
    const timeSelect = document.getElementById('timeSlot');
    slots.forEach(s => timeSelect.add(new Option(s, s)));

    function updateRepList() {
        const region = document.getElementById('region').value;
        const repDropdown = document.getElementById('requestedRep');
        repDropdown.innerHTML = '<option value="">Any Available</option>';
        reps.filter(r => r.region === 'BOTH' || r.region === region).forEach(r => {
            repDropdown.add(new Option(r.name, r.name));
        });
    }

    document.getElementById('bookingForm').addEventListener('submit', function(e) {
        if(e) e.preventDefault();
        sendBooking();
    });

    function sendBooking() {
        const btn = document.getElementById('submitBtn');
        const loader = document.getElementById('loader');
        const suggBox = document.getElementById('suggestionBox');
        
        btn.disabled = true;
        loader.style.display = 'block';
        suggBox.style.display = 'none';

        const payload = {
            firstName: document.getElementById('firstName').value,
            lastName: document.getElementById('lastName').value,
            companyName: document.getElementById('companyName').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            region: document.getElementById('region').value,
            date: document.getElementById('date').value,
            time: document.getElementById('timeSlot').value,
            rep: document.getElementById('requestedRep').value || "Any Available"
        };

        fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) })
        .then(res => res.json())
        .then(data => {
            if (data.status === 'success') {
                alert("✅ SUCCESS: " + data.message);
                document.getElementById('bookingForm').reset();
            } 
            else if (data.status === 'busy') {
                showSuggestions(data.suggestions);
            }
        })
        .catch(err => alert("Connection error. Ensure the Script is deployed and you are online."))
        .finally(() => {
            btn.disabled = false;
            loader.style.display = 'none';
        });
    }

    function showSuggestions(suggestions) {
        const suggBox = document.getElementById('suggestionBox');
        const suggList = document.getElementById('suggestionList');
        suggBox.style.display = 'block';
        suggList.innerHTML = '';

        // Time Suggestions (Same Rep)
        suggestions.timeSlots.forEach(time => {
            createPill(`Same Rep at ${time}`, () => {
                document.getElementById('timeSlot').value = time;
                sendBooking();
            });
        });

        // Other Reps Suggestions (Same Time)
        suggestions.otherReps.forEach(repName => {
            createPill(`Switch to ${repName}`, () => {
                document.getElementById('requestedRep').value = repName;
                sendBooking();
            });
        });
    }

    function createPill(text, callback) {
        const pill = document.createElement('div');
        pill.className = 'suggestion-pill';
        pill.innerText = text;
        pill.onclick = callback;
        document.getElementById('suggestionList').appendChild(pill);
    }
</script>

</body>
</html>
